services:
  - type: web
    name: alertas-sporting
    env: node
    plan: starter
    buildCommand: ""
    startCommand: "node server.js"
    healthCheckPath: "/health"
    envVars:
      - key: APP_TIMEZONE
        value: Europe/Lisbon
      - key: FOOTBALL_DATA_KEY
        sync: false
      - key: EMAIL_TO
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "465"
